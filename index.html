<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Styles/header.css">
    <link rel="stylesheet" href="Styles/general.css">
    <title>YouTube</title>
  </head>
  <body>
    <!-- Header Section -->
    <header>
        <div class="header-left">
            <img src="icons/hamburger-menu.svg" alt="">
            <img class="yt-logo" src="icons/youtube-logo.svg" alt="">
        </div>

        <div class="header-middle">
            <input class="search-box" type="text" placeholder="Search">
            <img class="search-icon" src="icons/search.svg" alt="">
            <img class="mic-icon" src="icons/voice-search-icon.svg" alt="">
        </div>

        <div class="header-right">
            <img src="icons/upload.svg" alt="">
            <img src="icons/youtube-apps.svg" alt="">
            <div class="notification-icon">
                <img src="icons/notifications.svg" alt="">
                <div class="notification-count">3</div>
            </div>
            <img class="profile-pic" src="PICTURES/my-channel.jpeg" alt="">
        </div>
    </header>








  </body>
</html>
